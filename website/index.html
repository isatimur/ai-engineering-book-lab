<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Lexend:wght@300;400;500;600&display=swap" rel="preload" as="style" onload="this.rel='stylesheet'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>
    <!--
      <title>, description, canonical, and Open Graph tags are owned by each
      route's <Seo> component (vite-react-ssg <Head>) and inlined per page at
      build time. Intentionally omitted here to avoid duplicate/conflicting tags.
    -->
    <!-- No routes use React Router loaders; avoid a production fetch for SSG loader JSON. -->
    <script>
      window.__VITE_REACT_SSG_STATIC_LOADER_MANIFEST__ =
        window.__VITE_REACT_SSG_STATIC_LOADER_MANIFEST__ || {};
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
