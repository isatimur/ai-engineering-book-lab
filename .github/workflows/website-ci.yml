name: website-ci

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'diagrams/**'
  pull_request:
    paths:
      - 'website/**'
      - 'diagrams/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
