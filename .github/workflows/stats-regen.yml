name: stats-regen

on:
  push:
    branches: [main]
    paths:
      - '01_Videos/**'
      - '02_Themes/**'
      - '03_People/**'
      - '04_Concepts/**'
      - 'public/**'
      - 'claims/Claims Ledger.md'
      - 'claims/anchors/**'
      - 'diagrams/**'
      - 'research_passes/**'
      - 'tasks/**'
      - 'programs/**'
      - 'website/src/data/bookChapters.ts'
      - '99_Meta/scripts/build_stats.py'
  workflow_dispatch:

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Regenerate STATS.md + stats.json
        run: python 99_Meta/scripts/build_stats.py
      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet STATS.md stats.json website/src/data/stats.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add STATS.md stats.json website/src/data/stats.json
            git commit -m "chore(stats): regenerate STATS.md + stats.json from corpus changes [skip ci]"

            # evidence-regen.yml can trigger on the same push (overlapping path
            # filters under claims/**) and race this job to push to main.
            # Rebase-and-retry instead of failing outright on a rejected push.
            for attempt in 1 2 3 4 5; do
              if git push; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "::error::Failed to push stats regen after ${attempt} attempts."
                exit 1
              fi
              echo "Push rejected (attempt ${attempt}/5) — main moved, rebasing and retrying..."
              sleep $((attempt * 3))
              git fetch origin main
              git rebase origin/main
            done
          else
            echo "No stats changes — skipping commit"
          fi
